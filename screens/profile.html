<div id="screen-profile" class="screen">
    <div class="screen-header-with-back">
        <button class="back-btn" onclick="showScreen('home')">
            <i data-lucide="arrow-left"></i>
        </button>
        <h2>Perfil</h2>
    </div>
    <section class="section">
        <div class="profile-header">
            <div class="profile-avatar"><i data-lucide="user-circle"></i></div>
            <div class="profile-info">
                <span class="profile-name" id="profile-user-name">Apostador</span>
                <span class="profile-email" id="profile-user-email"></span>
            </div>
        </div>
    </section>

    <section class="section">
        <h2 class="section-title">Programa de Indicação</h2>
        <div class="affiliate-card">
            <span class="affiliate-label">Seu código de indicação</span>
            <div class="affiliate-code">
                <span id="affiliate-code">LOTO2026XYZ</span>
                <button class="btn-copy" onclick="copyCode()">Copiar</button>
            </div>
            <span class="affiliate-bonus">Ganhe R$ 10,00 por cada amigo indicado!</span>
            <button class="btn-share" onclick="shareCode()"><i data-lucide="share-2"></i> Compartilhar</button>
        </div>
    </section>


    <section class="section">
        <div class="menu-list">
            <div class="menu-item" onclick="showScreen('my-bets')">
                <span class="menu-icon"><i data-lucide="scroll-text"></i></span>
                <span class="menu-label">Resultados</span>
                <span class="menu-arrow">›</span>
            </div>
            <div class="menu-item" onclick="showScreen('home')">
                <span class="menu-icon"><i data-lucide="trophy"></i></span>
                <span class="menu-label">Últimos Concursos</span>
                <span class="menu-arrow">›</span>
            </div>
            <div class="menu-item" onclick="showScreen('settings')">
                <span class="menu-icon"><i data-lucide="settings"></i></span>
                <span class="menu-label">Configurações</span>
                <span class="menu-arrow">›</span>
            </div>
        </div>
    </section>
</div>
